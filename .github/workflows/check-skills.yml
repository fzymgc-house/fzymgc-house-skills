name: Check Skills

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v6
      - name: Check release-please config covers all skills
        run: |
          actual=$(find homelab/skills pr-review/skills jj/skills -name SKILL.md -exec dirname {} \; 2>/dev/null | sort -u)
          # release-please-config.json may have plugin-level keys (e.g., "jj")
          # or skill-level keys (e.g., "homelab/skills/grafana"). This script
          # handles both by expanding plugin-level keys to their skill dirs.
          #
          # Extract all config keys, then resolve to skill directories:
          # - Keys with /skills/ are skill-level entries (use directly)
          # - Other keys (plugin-level) expand to their skill dirs
          all_keys=$(jq -r '.packages | keys[] | select(. != ".")' release-please-config.json)
          # Validate keys and expand plugin-level keys to skill dirs in a single
          # pass. The while loop runs in the main shell (here-string, no pipe)
          # so exit 1 actually aborts the step; output goes to a temp file that
          # is sorted afterwards.
          configured_tmp=$(mktemp)
          while read -r key; do
            if [[ "$key" =~ [^a-zA-Z0-9_./-] ]]; then
              echo "::error::Unsafe character in release-please key: $key"
              rm -f "$configured_tmp"
              exit 1
            fi
            if [[ "$key" == *".."* ]]; then
              echo "::error::key '$key' contains '..' path traversal"
              rm -f "$configured_tmp"
              exit 1
            fi
            case "$key" in
              */skills/*) echo "$key" ;;
              *) find "$key/skills" -name SKILL.md -exec dirname {} \; 2>/dev/null ;;
            esac
          done <<< "$all_keys" >> "$configured_tmp"
          configured=$(sort -u "$configured_tmp"); rm -f "$configured_tmp"
          if ! diff <(echo "$actual") <(echo "$configured"); then
            echo "::error::Skill directories and release-please-config.json are out of sync"
            exit 1
          fi

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v6
      - name: Install bats
        run: |
          wget -q https://github.com/bats-core/bats-core/archive/refs/tags/v1.11.0.tar.gz
          tar xzf v1.11.0.tar.gz
          sudo bats-core-1.11.0/install.sh /usr/local
          rm -rf v1.11.0.tar.gz bats-core-1.11.0
      - name: Run hook tests
        run: bats .claude/hooks/tests/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v6
      - name: Install rumdl
        run: |
          RUMDL_VERSION="v0.1.43"
          ASSET="rumdl-${RUMDL_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          gh release download "$RUMDL_VERSION" --repo rvben/rumdl \
            --pattern "$ASSET" --pattern "${ASSET}.sha256" --dir /tmp
          cd /tmp && sha256sum -c "${ASSET}.sha256"
          tar xz -C /usr/local/bin rumdl < "/tmp/${ASSET}"
          rm -f "/tmp/${ASSET}" "/tmp/${ASSET}.sha256"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Lint markdown
        run: |
          rumdl check homelab/skills/*/SKILL.md \
            pr-review/skills/*/SKILL.md \
            jj/skills/*/SKILL.md \
            jj/commands/*.md \
            pr-review/agents/*.md
      - name: Validate evals against schema
        run: |
          pip install check-jsonschema
          check-jsonschema --schemafile pr-review/evals/evals.schema.json \
            pr-review/evals/evals.json \
            jj/evals/evals.json
