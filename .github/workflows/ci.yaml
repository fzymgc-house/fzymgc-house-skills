name: CI

# Runs the same gates as `task lint` / `task test` so local and CI agree by
# construction. There is no pre-commit hook manager (lefthook was removed — jj
# does not fire git hooks reliably); the Taskfile is the single source of truth.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install Task
        run: |
          sh -c "$(curl -sSfL https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin v3.50.0
          task --version

      - name: Install rumdl
        run: |
          RUMDL_VERSION="v0.1.43"
          ASSET="rumdl-${RUMDL_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          gh release download "$RUMDL_VERSION" --repo rvben/rumdl \
            --pattern "$ASSET" --pattern "${ASSET}.sha256" --dir /tmp
          cd /tmp && sha256sum -c "${ASSET}.sha256"
          tar xz -C /usr/local/bin rumdl < "/tmp/${ASSET}"
          rm -f "/tmp/${ASSET}" "/tmp/${ASSET}.sha256"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install ruff
        run: |
          uv tool install ruff@0.15.2
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Lint
        run: task lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install jj
        run: |
          JJ_VERSION="v0.42.0"
          curl -sSfL "https://github.com/jj-vcs/jj/releases/download/${JJ_VERSION}/jj-${JJ_VERSION}-x86_64-unknown-linux-musl.tar.gz" -o /tmp/jj.tar.gz
          tar xzf /tmp/jj.tar.gz -C /usr/local/bin --strip-components=0 ./jj
          rm /tmp/jj.tar.gz
          jj --version

      - name: Install Task
        run: |
          sh -c "$(curl -sSfL https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin v3.50.0
          task --version

      - name: Test
        run: task test
