name: Check Skills

on:
  pull_request:
    branches: [main]

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check release-please config covers all skills
        run: |
          actual=$(find homelab/skills pr-review/skills jj/skills -name SKILL.md -exec dirname {} \; 2>/dev/null | sort)
          # release-please-config.json may have plugin-level keys (e.g., "jj")
          # or skill-level keys (e.g., "homelab/skills/grafana"). This script
          # handles both by expanding plugin-level keys to their skill dirs.
          #
          # Extract all config keys, then resolve to skill directories:
          # - Keys with /skills/ are skill-level entries (use directly)
          # - Other keys (plugin-level) expand to their skill dirs
          all_keys=$(jq -r '.packages | keys[] | select(. != ".")' release-please-config.json)
          # Validate keys in the main shell (not a subshell) so exit 1
          # actually aborts the step.
          while read -r key; do
            if [[ "$key" =~ [^a-zA-Z0-9_./-] ]]; then
              echo "::error::Unsafe character in release-please key: $key"
              exit 1
            fi
          done <<< "$all_keys"
          configured=$(echo "$all_keys" | while read -r key; do
            case "$key" in
              */skills/*) echo "$key" ;;
              *) find "$key/skills" -name SKILL.md -exec dirname {} \; 2>/dev/null ;;
            esac
          done | sort -u)
          if ! diff <(echo "$actual") <(echo "$configured"); then
            echo "::error::Skill directories and release-please-config.json are out of sync"
            exit 1
          fi

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats
      - name: Run hook tests
        run: bats .claude/hooks/tests/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install rumdl
        run: |
          RUMDL_VERSION="v0.1.43"
          ASSET="rumdl-${RUMDL_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          gh release download "$RUMDL_VERSION" --repo rvben/rumdl \
            --pattern "$ASSET" --pattern "${ASSET}.sha256" --dir /tmp
          cd /tmp && sha256sum -c "${ASSET}.sha256"
          tar xz -C /usr/local/bin rumdl < "/tmp/${ASSET}"
          rm -f "/tmp/${ASSET}" "/tmp/${ASSET}.sha256"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Lint markdown
        run: |
          rumdl check homelab/skills/*/SKILL.md \
            pr-review/skills/*/SKILL.md \
            jj/skills/*/SKILL.md \
            pr-review/agents/*.md
