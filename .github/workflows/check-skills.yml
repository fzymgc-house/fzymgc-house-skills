name: Check Skills

on:
  pull_request:
    branches: [main]

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check release-please config covers all skills
        run: |
          actual=$(find homelab/skills pr-review/skills jj/skills -name SKILL.md -exec dirname {} \; 2>/dev/null | sort)
          # Extract all config keys, then resolve to skill directories:
          # - Keys with /skills/ are skill-level entries (use directly)
          # - Other keys (plugin-level) expand to their skill dirs,
          #   but only if no sibling skill-level keys already cover them
          all_keys=$(jq -r '.packages | keys[] | select(. != ".")' release-please-config.json)
          configured=$(echo "$all_keys" | while read -r key; do
            if [[ "$key" == */skills/* ]]; then
              echo "$key"
            elif [[ -d "$key/skills" ]]; then
              # Only expand if no skill-level keys exist under this plugin
              if ! echo "$all_keys" | grep -q "^${key}/skills/"; then
                find "$key/skills" -name SKILL.md -exec dirname {} \;
              fi
            fi
          done | sort)
          if ! diff <(echo "$actual") <(echo "$configured"); then
            echo "::error::Skill directories and release-please-config.json are out of sync"
            exit 1
          fi

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats
      - name: Run hook tests
        run: bats .claude/hooks/tests/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install rumdl
        run: |
          tag=$(gh release view --repo rvben/rumdl --json tagName -q .tagName)
          gh release download "$tag" --repo rvben/rumdl \
            --pattern "rumdl-${tag}-x86_64-unknown-linux-gnu.tar.gz" --output - \
            | tar xz -C /usr/local/bin rumdl
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Lint markdown
        run: |
          rumdl check homelab/skills/*/SKILL.md \
            pr-review/skills/*/SKILL.md \
            jj/skills/*/SKILL.md \
            pr-review/agents/*.md
