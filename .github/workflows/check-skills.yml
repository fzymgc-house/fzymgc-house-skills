name: Check Skills

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install jj
        run: |
          JJ_VERSION="v0.28.2"
          curl -sSfL "https://github.com/jj-vcs/jj/releases/download/${JJ_VERSION}/jj-${JJ_VERSION}-x86_64-unknown-linux-musl.tar.gz" -o /tmp/jj.tar.gz
          tar xzf /tmp/jj.tar.gz -C /usr/local/bin --strip-components=0 ./jj
          rm /tmp/jj.tar.gz
          jj --version
      - name: Run hook tests
        run: uv run --with pytest pytest .claude/hooks/tests/ jj/hooks/tests/ dev-flow/hooks/tests/ tests/ -v --import-mode=importlib

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install rumdl
        run: |
          RUMDL_VERSION="v0.1.43"
          ASSET="rumdl-${RUMDL_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          gh release download "$RUMDL_VERSION" --repo rvben/rumdl \
            --pattern "$ASSET" --pattern "${ASSET}.sha256" --dir /tmp
          cd /tmp && sha256sum -c "${ASSET}.sha256"
          tar xz -C /usr/local/bin rumdl < "/tmp/${ASSET}"
          rm -f "/tmp/${ASSET}" "/tmp/${ASSET}.sha256"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Lint markdown
        run: |
          # --no-exclude: explicitly bypass .rumdl.toml's dev-flow/** exclude
          # for the specific fork-modified files we want CI to lint.
          rumdl check --no-exclude homelab/skills/*/SKILL.md \
            dev-flow/skills/review-pr/SKILL.md \
            dev-flow/skills/address-findings/SKILL.md \
            dev-flow/skills/respond-to-comments/SKILL.md \
            jj/skills/*/SKILL.md \
            dev-flow/skills/using-worktrees/SKILL.md \
            dev-flow/skills/requesting-code-review/SKILL.md \
            dev-flow/references/vcs-preamble.md \
            jj/commands/*.md \
            dev-flow/agents/*.md
          # Note: dev-flow skills that are lightly modified from upstream
          # (brainstorming, writing-plans, finishing-a-development-branch,
          # subagent-driven-development) are excluded from lint to avoid
          # diverging from upstream style, which would complicate scan-upstream.
          # The review skills/agents (formerly the pr-review plugin) ARE linted
          # explicitly above; dev-flow/agents/*.md covers all 16 review +
          # artifact-reviewer agents.
      - name: Validate evals against schema
        run: |
          pip install 'check-jsonschema>=0.37,<0.38'
          check-jsonschema --schemafile dev-flow/evals/evals.schema.json \
            dev-flow/evals/evals.json \
            jj/evals/evals.json
      - name: Run adr-doctor (full pass)
        run: ./dev-flow/scripts/adr-doctor.sh
