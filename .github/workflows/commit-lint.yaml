name: Commit Lint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main]

permissions:
  contents: read

jobs:
  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read # action-semantic-pull-request reads PR metadata via GITHUB_TOKEN
    steps:
      # release-please derives the version bump from squash-merged PR titles, so
      # the PR title is the conventional-commit source of truth. (Replaces the
      # former `cog verify` check; cog was removed with the move to release-please.)
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
