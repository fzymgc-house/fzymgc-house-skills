version: "3"

# Single source of truth for repo quality gates. There is no pre-commit hook
# manager (lefthook was removed — jj does not fire git hooks reliably), so run
# `task fmt` before committing and `task lint` / `task test` to gate. CI
# (.github/workflows/ci.yaml) invokes these same tasks, so local and CI agree
# by construction.

vars:
  # Markdown linted explicitly. The repo's .rumdl.toml excludes dev-flow/**
  # (lightly-modified upstream skills tracked by scan-upstream); --no-exclude
  # plus this explicit list lets us lint the original / heavily-forked files
  # without imposing our style on the rest and complicating upstream sync.
  # Living docs + shipped artifacts only. Historical records under docs/plans/
  # and docs/superpowers/ are point-in-time and intentionally not style-gated.
  MD_FILES: >-
    README.md AGENTS.md CLAUDE.md
    homelab/skills/*/SKILL.md
    jj/skills/*/SKILL.md
    jj/commands/*.md
    dev-flow/references/vcs-preamble.md
    dev-flow/agents/*.md
    dev-flow/skills/review-pr/SKILL.md
    dev-flow/skills/address-findings/SKILL.md
    dev-flow/skills/respond-to-comments/SKILL.md
    dev-flow/skills/using-worktrees/SKILL.md
    dev-flow/skills/requesting-code-review/SKILL.md
    dev-flow/skills/solving-a-bead/SKILL.md
    dev-flow/skills/grepping/SKILL.md
    dev-flow/skills/grepping/references/ripgrep.md
    dev-flow/skills/grepping/references/grep.md
    dev-flow/skills/grepping/references/ugrep.md
    dev-flow/skills/grepping/references/ast-grep.md
    tmux/skills/*/SKILL.md
    dev-flow/skills/drain-with-worker/SKILL.md
    dev-flow/references/drain-with-worker.md
  PLUGIN_JSON: >-
    .claude-plugin/marketplace.json .agents/plugins/marketplace.json
    homelab/plugin.json jj/plugin.json dev-flow/plugin.json tmux/plugin.json
    plugins/*/.codex-plugin/plugin.json
  # All harness-independent pytest suites. Behavioral evals (dev-flow/evals,
  # jj/evals) need the Claude agent harness to execute and are only
  # schema-validated in `lint`, never run here.
  PYTEST_DIRS: >-
    tests/
    .claude/hooks/tests/
    jj/hooks/tests/
    dev-flow/hooks/tests/
    dev-flow/scripts/tests/
    homelab/skills/terraform/tests/

tasks:
  fmt:
    desc: Auto-format markdown and Python (run before committing)
    cmds:
      - rumdl fmt --no-exclude {{.MD_FILES}}
      - ruff format .
      - ruff check --fix .

  lint:
    desc: Run all non-test quality gates (markdown, Python, JSON, evals, ADRs)
    cmds:
      - rumdl check --no-exclude {{.MD_FILES}}
      - ruff check .
      - ruff format --check .
      - jq empty {{.PLUGIN_JSON}}
      - uv run --with 'check-jsonschema>=0.37,<0.38' check-jsonschema
        --schemafile dev-flow/evals/evals.schema.json
        dev-flow/evals/evals.json jj/evals/evals.json
      - ./dev-flow/scripts/adr-doctor.sh

  test:
    desc: Run all harness-independent tests (excludes Claude/agent evals)
    cmds:
      - uv run --with pytest --with httpx --with pyyaml pytest {{.PYTEST_DIRS}}
        -q --import-mode=importlib

  # Releases are managed by release-please (.github/workflows/release.yaml):
  # merging conventional-commit PRs to main maintains a release PR that bumps
  # .release-please-manifest.json + the plugin/marketplace $.version extra-files
  # + CHANGELOG.md; merging that PR cuts the tag + GitHub Release. There is no
  # local release task and no `cog` — PR titles are validated by the
  # commit-lint workflow (amannn/action-semantic-pull-request).
